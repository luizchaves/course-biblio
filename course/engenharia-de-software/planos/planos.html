<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planos de Ensino — Engenharia de Software</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      color: #1f2937;
      background: #f5f7fa;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(100%, 1200px);
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 6px;
      color: #111827;
      font-size: 1.5rem;
    }

    .subtitle {
      margin: 0 0 20px;
      color: #6b7280;
      font-size: 0.9rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-label {
      color: #4b5563;
      font-size: 0.82rem;
      font-weight: 650;
    }

    .sort-toggle {
      display: inline-flex;
      border: 1px solid #cfd8e3;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .sort-toggle-button {
      min-width: 74px;
      padding: 7px 12px;
      border: 0;
      border-right: 1px solid #cfd8e3;
      color: #374151;
      background: #fff;
      cursor: pointer;
      font: inherit;
      font-size: 0.82rem;
      font-weight: 650;
    }

    .sort-toggle-button:last-child {
      border-right: 0;
    }

    .sort-toggle-button:hover,
    .sort-toggle-button:focus-visible {
      background: #f3f4f6;
    }

    .sort-toggle-button.is-active {
      color: #fff;
      background: #1d4ed8;
    }

    .table-container {
      overflow-x: auto;
      border: 1px solid #dbe1e8;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 8px rgb(15 23 42 / 6%);
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border-right: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    tr:last-child td,
    tr:last-child th {
      border-bottom: 0;
    }

    th:last-child,
    td:last-child {
      border-right: 0;
    }

    thead th {
      padding: 10px;
      color: #374151;
      background: #f3f4f6;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-align: center;
      text-transform: uppercase;
    }

    .row-header {
      width: 54px;
      min-width: 54px;
      padding: 8px;
      color: #6b7280;
      background: #fafafa;
      font-size: 0.75rem;
      font-weight: 700;
      text-align: center;
    }

    td {
      height: 118px;
      padding: 10px;
      vertical-align: top;
    }

    .subject-code {
      display: inline-block;
      margin-bottom: 5px;
      padding: 2px 6px;
      border-radius: 999px;
      color: #1d4ed8;
      background: #dbeafe;
      font-size: 0.68rem;
      font-weight: 700;
    }

    .subject-abbreviation {
      margin-left: 5px;
      color: #6b7280;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .subject-name {
      display: -webkit-box;
      overflow: hidden;
      color: #111827;
      font-size: 0.86rem;
      font-weight: 650;
      line-height: 1.3;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .syllabus {
      display: grid;
      gap: 8px;
      margin: 9px 0 0;
      padding: 0;
      list-style: none;
    }

    .syllabus-semester {
      padding-top: 7px;
      border-top: 1px solid #e5e7eb;
    }

    .semester-label {
      cursor: pointer;
      list-style: none;
      color: #374151;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .semester-label::-webkit-details-marker {
      display: none;
    }

    .semester-label::before {
      display: inline-block;
      width: 12px;
      margin-right: 3px;
      color: #6b7280;
      content: "▸";
    }

    .syllabus-semester[open] .semester-label::before {
      content: "▾";
    }

    .semester-content {
      margin-top: 5px;
    }

    .document-row + .document-row {
      margin-top: 6px;
    }

    .document-professor {
      margin-bottom: 3px;
      color: #6b7280;
      font-size: 0.7rem;
      line-height: 1.3;
    }

    .document-links {
      color: #374151;
      font-size: 0.73rem;
    }

    .document-link {
      color: #1d4ed8;
      font-weight: 600;
      text-decoration: none;
    }

    .document-link:hover,
    .document-link:focus-visible {
      text-decoration: underline;
    }

    .empty-cell {
      background: #fafafa;
    }

    .loading,
    .error {
      padding: 20px;
      color: #6b7280;
      text-align: center;
    }

    .error {
      color: #b91c1c;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      h1 {
        font-size: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Planos de Ensino — Engenharia de Software</h1>
    <p class="subtitle">Os planos estão organizados por período e podem ser ordenados por código ou nome da disciplina.</p>
    <div class="toolbar">
      <div class="toolbar-group">
        <span class="toolbar-label" id="semester-label">Semestre</span>
        <div class="sort-toggle" id="semester-toggle" role="group" aria-labelledby="semester-label"></div>
      </div>
      <div class="toolbar-group">
        <span class="toolbar-label" id="class-label">Turma</span>
        <div class="sort-toggle" id="class-toggle" role="group" aria-labelledby="class-label"></div>
      </div>
      <div class="toolbar-group">
        <span class="toolbar-label" id="sort-label">Ordenar por</span>
        <div class="sort-toggle" role="group" aria-labelledby="sort-label">
          <button class="sort-toggle-button is-active" type="button" data-sort-field="code" aria-pressed="true">Código</button>
          <button class="sort-toggle-button" type="button" data-sort-field="name" aria-pressed="false">Nome</button>
        </div>
      </div>
    </div>
    <div id="content" class="table-container">
      <div class="loading">Carregando planos…</div>
    </div>
  </main>

  <script>
    const SUAP_PDF_URL =
      'https://suap.ifpb.edu.br/documento_eletronico/imprimir_documento_pdf/';
    const SUAP_PAGE_URL =
      'https://suap.ifpb.edu.br/documento_eletronico/visualizar_documento/';
    const SUAP_CLASS_RECORD_URL =
      'https://suap.ifpb.edu.br/edu/diario/';
    const ROW_HEADER_WIDTH = 54;
    const PERIOD_COLUMN_MIN_WIDTH = 230;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function parsePosition(code) {
      const match = /^ES(\d)(\d)$/.exec(String(code ?? '').trim());
      if (!match) return null;

      return {
        column: Number(match[1]),
        row: Number(match[2]),
      };
    }

    function compareSubjects(sortField) {
      return (left, right) => {
        if (sortField === 'name') {
          const byName = String(left.subject ?? '').localeCompare(String(right.subject ?? ''), 'pt-BR', {
            sensitivity: 'base',
          });
          if (byName !== 0) return byName;
        }

        const byCode = String(left.code ?? '').localeCompare(String(right.code ?? ''), 'pt-BR', {
          numeric: true,
          sensitivity: 'base',
        });
        if (byCode !== 0) return byCode;

        return String(left.subject ?? '').localeCompare(String(right.subject ?? ''), 'pt-BR', {
          sensitivity: 'base',
        });
      };
    }

    function getClassTerm(classId) {
      return String(classId ?? '').split('.')[0];
    }

    function getSemesterLabel(syllabusItem) {
      return String(syllabusItem?.semester ?? '');
    }

    function formatTerm(term) {
      const match = /^(\d{4})([12])$/.exec(String(term ?? ''));
      return match ? `${match[1]}.${match[2]}` : String(term ?? '');
    }

    function getTerms(subjects) {
      const terms = subjects.flatMap(subject =>
        (subject.syllabus ?? []).map(item => getClassTerm(item.classId))
      );
      return [...new Set(terms)]
        .filter(Boolean)
        .sort((left, right) => String(right).localeCompare(String(left), 'pt-BR', { numeric: true }))
        .map(term => ({
          id: term,
          label: formatTerm(term),
        }));
    }

    function getSubjectPeriod(subject) {
      return Number(String(subject?.period ?? '').replace(/^P/i, ''));
    }

    function addTerms(term, offset) {
      const match = /^(\d{4})([12])$/.exec(String(term ?? ''));
      if (!match) return term;

      const startYear = Number(match[1]);
      const startHalf = Number(match[2]);
      const halfIndex = (startYear * 2) + (startHalf - 1) + offset;
      const year = Math.floor(halfIndex / 2);
      const half = (halfIndex % 2) + 1;
      return `${year}${half}`;
    }

    function getExpectedClassTerm(classFilter, subject) {
      const period = getSubjectPeriod(subject);
      if (classFilter === 'all' || !period) return classFilter;
      return addTerms(classFilter, period - 1);
    }

    function getFilteredSyllabus(subject, semesterFilter, classFilter) {
      const syllabus = subject.syllabus ?? [];
      const expectedClassTerm = getExpectedClassTerm(classFilter, subject);

      return (syllabus ?? []).filter(item => {
        const term = getClassTerm(item.classId);
        const matchesSemester = semesterFilter === 'all' || term === semesterFilter;
        const matchesClass = classFilter === 'all' || term === expectedClassTerm;
        return matchesSemester && matchesClass;
      });
    }

    function getFilteredSubjects(subjects, semesterFilter, classFilter) {
      if (semesterFilter === 'all' && classFilter === 'all') return subjects;

      return subjects
        .map(subject => ({
          ...subject,
          syllabus: getFilteredSyllabus(subject, semesterFilter, classFilter),
        }))
        .filter(subject => subject.syllabus.length > 0);
    }

    function renderSemesterFilter(terms) {
      const buttons = [
        '<button class="sort-toggle-button is-active" type="button" data-semester-filter="all" aria-pressed="true">Todos</button>',
        ...terms.map(term =>
          `<button class="sort-toggle-button" type="button" data-semester-filter="${escapeHtml(term.id)}" aria-pressed="false">${escapeHtml(term.label)}</button>`
        ),
      ];
      return buttons.join('');
    }

    function renderClassFilter(terms) {
      const buttons = [
        '<button class="sort-toggle-button is-active" type="button" data-class-filter="all" aria-pressed="true">Todas</button>',
        ...terms.map(term =>
          `<button class="sort-toggle-button" type="button" data-class-filter="${escapeHtml(term.id)}" aria-pressed="false">${escapeHtml(term.label)}</button>`
        ),
      ];
      return buttons.join('');
    }

    function renderSyllabus(syllabus) {
      if (!syllabus?.length) return '';

      const periods = [...syllabus]
        .sort((left, right) =>
          String(right.semester).localeCompare(String(left.semester), 'pt-BR', { numeric: true })
        )
        .map((item, index) => {
          const documents = item.documents ?? [];
          const semester = escapeHtml(getSemesterLabel(item));
          const documentRows = documents
            .map(document => {
              const documentId = encodeURIComponent(document.documentId);
              const classRecordId = encodeURIComponent(document.classRecordId);
              const planLinks = document.documentId
                ? `Plano (<a class="document-link" href="${SUAP_PAGE_URL}${documentId}/" target="_blank" rel="noopener" title="Visualizar plano de ensino de ${semester}">Web</a>, <a class="document-link" href="${SUAP_PDF_URL}${documentId}/carta/" target="_blank" rel="noopener" title="Abrir PDF do plano de ensino de ${semester}">PDF</a>) · `
                : '';
              return `<div class="document-row">
                <div class="document-professor">${escapeHtml(document.professor)}</div>
                <div class="document-links">
                  ${planLinks}
                  <a class="document-link" href="${SUAP_CLASS_RECORD_URL}${classRecordId}/" target="_blank" rel="noopener" title="Abrir diário de ${semester}">Diário</a>
                </div>
              </div>`;
            })
            .join('');
          return `<li>
            <details class="syllabus-semester"${index === 0 ? ' open' : ''}>
              <summary class="semester-label">${semester}</summary>
              <div class="semester-content">${documentRows}</div>
            </details>
          </li>`;
        })
        .join('');

      return `<ul class="syllabus">${periods}</ul>`;
    }

    function renderTable(subjects, sortField = 'code', semesterFilter = 'all', classFilter = 'all') {
      const filteredSubjects = getFilteredSubjects(subjects, semesterFilter, classFilter);
      const positionedSubjects = filteredSubjects
        .map(subject => ({ subject, position: parsePosition(subject.code) }))
        .filter(item => item.position);

      if (positionedSubjects.length === 0) {
        return '<div class="loading">Nenhum plano encontrado para os filtros selecionados.</div>';
      }

      const maxColumn = Math.max(...positionedSubjects.map(item => item.position.column));
      const subjectsByColumn = new Map();

      for (const item of positionedSubjects) {
        const columnSubjects = subjectsByColumn.get(item.position.column) ?? [];
        columnSubjects.push(item.subject);
        subjectsByColumn.set(item.position.column, columnSubjects);
      }

      for (const columnSubjects of subjectsByColumn.values()) {
        columnSubjects.sort(compareSubjects(sortField));
      }

      const maxRow = Math.max(...Array.from(subjectsByColumn.values(), columnSubjects => columnSubjects.length));

      const headers = Array.from(
        { length: maxColumn },
        (_, index) => `<th scope="col">${index + 1}º período</th>`
      ).join('');
      const colgroup = `<colgroup>
        <col style="width: ${ROW_HEADER_WIDTH}px">
        ${Array.from({ length: maxColumn }, () => `<col style="width: ${PERIOD_COLUMN_MIN_WIDTH}px">`).join('')}
      </colgroup>`;
      const tableMinWidth = ROW_HEADER_WIDTH + (maxColumn * PERIOD_COLUMN_MIN_WIDTH);

      const rows = Array.from({ length: maxRow }, (_, rowIndex) => {
        const row = rowIndex + 1;
        const cells = Array.from({ length: maxColumn }, (_, columnIndex) => {
          const column = columnIndex + 1;
          const subject = subjectsByColumn.get(column)?.[rowIndex];

          if (!subject) {
            return '<td class="empty-cell" aria-label="Sem disciplina"></td>';
          }

          return `<td>
            <span class="subject-code">${escapeHtml(subject.code)}</span><span class="subject-abbreviation">${escapeHtml(subject.abbreviation)}</span>
            <div class="subject-name" title="${escapeHtml(subject.subject)}">${escapeHtml(subject.subject)}</div>
            ${renderSyllabus(subject.syllabus)}
          </td>`;
        }).join('');

        return `<tr><th class="row-header" scope="row">${row}</th>${cells}</tr>`;
      }).join('');

      return `<table style="min-width: ${tableMinWidth}px">
        ${colgroup}
        <thead>
          <tr>
            <th class="row-header" scope="col">Ordem</th>
            ${headers}
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    async function init() {
      const content = document.getElementById('content');
      const semesterToggle = document.getElementById('semester-toggle');
      const classToggle = document.getElementById('class-toggle');
      let currentSortField = 'code';
      let currentSemesterFilter = 'all';
      let currentClassFilter = 'all';

      try {
        const response = await fetch('planos.json');
        if (!response.ok) {
          throw new Error(`Não foi possível carregar planos.json (${response.status}).`);
        }

        const subjects = await response.json();
        const terms = getTerms(subjects);
        semesterToggle.innerHTML = renderSemesterFilter(terms);
        classToggle.innerHTML = renderClassFilter(terms);
        const sortButtons = Array.from(document.querySelectorAll('[data-sort-field]'));
        const semesterButtons = Array.from(document.querySelectorAll('[data-semester-filter]'));
        const classButtons = Array.from(document.querySelectorAll('[data-class-filter]'));

        const render = () => {
          content.innerHTML = renderTable(subjects, currentSortField, currentSemesterFilter, currentClassFilter);
        };

        const updatePressedState = (buttons, activeButton) => {
          buttons.forEach(button => {
            const isActive = button === activeButton;
            button.classList.toggle('is-active', isActive);
            button.setAttribute('aria-pressed', String(isActive));
          });
        };

        sortButtons.forEach(button => {
          button.addEventListener('click', () => {
            currentSortField = button.dataset.sortField;
            updatePressedState(sortButtons, button);
            render();
          });
        });

        semesterButtons.forEach(button => {
          button.addEventListener('click', () => {
            currentSemesterFilter = button.dataset.semesterFilter;
            updatePressedState(semesterButtons, button);
            render();
          });
        });

        classButtons.forEach(button => {
          button.addEventListener('click', () => {
            currentClassFilter = button.dataset.classFilter;
            updatePressedState(classButtons, button);
            render();
          });
        });

        render();
      } catch (error) {
        content.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
