<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Bacharelado em Engenharia de Software</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .semester { margin-bottom: 32px; }

    .semester-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      border-bottom: 2px solid #ddd;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .subject {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .subject-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .subject-name a {
      color: #1a1a1a;
      text-decoration: none;
    }

    .subject-name a:hover { text-decoration: underline; color: #0060df; }

    .subject-instructors { font-size: 0.8rem; color: #777; }

    .books { padding: 4px 14px; }

    .book {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .book:last-child { border-bottom: none; }

    .book-citation {
      flex: 1;
      min-width: 0;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #222;
    }

    .book-citation strong { font-weight: 600; }

    .book-citation a {
      color: inherit;
      text-decoration: none;
    }

    .book-citation a:hover { text-decoration: underline; color: #0060df; }

    .book-citation.loading { color: #aaa; font-style: italic; }
    .book-citation.error   { color: #c00; font-style: italic; font-size: 0.78rem; }

    .book-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
      padding-top: 2px;
    }

    .badge {
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
    }

    .badge-available { background: #d4edda; color: #155724; }
    .badge-consult   { background: #fff3cd; color: #856404; }
    .badge-borrowed  { background: #f8d7da; color: #721c24; }

    .bib-link {
      font-size: 0.72rem;
      font-family: monospace;
      white-space: nowrap;
      color: #0060df;
      text-decoration: none;
      border: 1px solid #c8d8f0;
      background: #f0f5ff;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .bib-link:hover { background: #dce9ff; }

    .no-books {
      padding: 8px 14px;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<h1>Reservas — Bacharelado em Engenharia de Software</h1>
<div id="content"></div>

<script>
/* ── BibTeX parser ────────────────────────────────────────────── */
function parseBibtex(raw) {
  const headerMatch = raw.match(/@(\w+)\s*\{([^,\s]*)\s*,/);
  if (!headerMatch) return {};

  const fields = {
    _type: headerMatch[1].toLowerCase(),
    _key: headerMatch[2],
  };

  let pos = raw.indexOf(',', raw.indexOf('{')) + 1;

  while (pos < raw.length) {
    while (pos < raw.length && /\s/.test(raw[pos])) pos++;
    if (raw[pos] === '}' || pos >= raw.length) break;

    const nameStart = pos;
    while (pos < raw.length && /\w/.test(raw[pos])) pos++;
    const name = raw.slice(nameStart, pos).toLowerCase();
    if (!name) break;

    while (pos < raw.length && /[\s=]/.test(raw[pos])) pos++;

    let value = '';
    if (raw[pos] === '{') {
      pos++;
      let depth = 1;
      const valStart = pos;
      while (pos < raw.length && depth > 0) {
        if (raw[pos] === '{') depth++;
        else if (raw[pos] === '}') depth--;
        pos++;
      }
      value = raw.slice(valStart, pos - 1).trim();
    } else if (raw[pos] === '"') {
      pos++;
      const valStart = pos;
      while (pos < raw.length && raw[pos] !== '"') pos++;
      value = raw.slice(valStart, pos).trim();
      pos++;
    }

    if (name) fields[name] = value;
    while (pos < raw.length && (raw[pos] === ',' || /\s/.test(raw[pos]))) pos++;
  }

  return fields;
}

/* ── ABNT NBR 6023 formatter ──────────────────────────────────── */
function formatAbnt(fields, kohaUrl, isbns = []) {
  const clean = s => s ? s.replace(/[\/,]+$/, '').replace(/\s*:\s*$/, '').replace(/\s*-\s*$/, '').trim() : '';
  const cleanYear = s => s ? s.replace(/^c/, '').replace(/\.$/, '').trim() : '';

  // Authors: "Sobrenome, Nome and Sobrenome2, Nome2"
  let authorsHtml = '';
  if (fields.author) {
    const authors = fields.author.split(/\s+and\s+/i).map(a => a.replace(/,\s*$/, '').trim()).filter(Boolean);
    const toAbnt = a => {
      const i = a.indexOf(',');
      if (i === -1) return a.toUpperCase();
      return `${a.slice(0, i).trim().toUpperCase()}, ${a.slice(i + 1).trim()}`;
    };
    const list = authors.length > 3
      ? [toAbnt(authors[0]), 'et al.']
      : authors.map(toAbnt);
    authorsHtml = list.join('; ');
  }

  // Title (bold, linked to koha if available)
  const titleText = clean(fields.title);
  let titleHtml = titleText ? `<strong>${titleText}</strong>` : '';
  if (titleHtml && kohaUrl) {
    titleHtml = `<strong><a href="${kohaUrl}" target="_blank">${titleText}</a></strong>`;
  }

  // Edition
  const edition = clean(fields.edition);

  // Place: Publisher, Year
  const address = clean(fields.address);
  const publisher = clean(fields.publisher);
  const year = cleanYear(fields.year);

  const location = [address, [publisher, year].filter(Boolean).join(', ')].filter(Boolean).join(': ');

  // Join with '. ' but avoid double period when a part already ends with '.'
  const parts = [authorsHtml, titleHtml, edition, location].filter(Boolean);
  const citation = parts.reduce((acc, part, i) => {
    if (i === 0) return part;
    return acc + (acc.endsWith('.') ? ' ' : '. ') + part;
  }, '');
  const normalizedCitation = citation.endsWith('.') ? citation : citation + '.';
  const isbnText = formatIsbns(isbns);
  return [normalizedCitation, isbnText].filter(Boolean).join(' ');
}

/* ── Render helpers ───────────────────────────────────────────── */
function situacaoClass(s) {
  const l = s.toLowerCase();
  if (l.includes('disponível')) return 'badge-available';
  if (l.includes('emprestado')) return 'badge-borrowed';
  return 'badge-consult';
}

function normalize(s) { return s?.trim().toLowerCase() ?? ''; }

function bookIsbns(book, bibFields) {
  const values = book.isbn?.length
    ? book.isbn
    : bibFields?.isbn?.split(/\s*[,;]\s*/) ?? [];
  return [...new Set(values.map(String).map(isbn => isbn.trim()).filter(Boolean))];
}

function formatIsbns(isbns) {
  return isbns.map(isbn => {
    const normalized = String(isbn).toUpperCase().replace(/[^0-9X]/g, '');
    const label = normalized.length === 13
      ? 'ISBN-13'
      : normalized.length === 10 ? 'ISBN-10' : 'ISBN';
    return `${label} ${normalized}.`;
  }).join(' ');
}

function bibtexUrl(path) {
  return path.startsWith('bibtex/') ? `../../../${path}` : path;
}

function bookSortKey(book, bibCache) {
  const fields = book.bibtex ? bibCache[book.bibtex] : null;
  return [fields?.author || book.autor, fields?.title || book.titulo]
    .filter(Boolean)
    .join(' ');
}

function groupBy(arr, key) {
  return arr.reduce((acc, item) => {
    const k = key(item);
    (acc[k] = acc[k] || []).push(item);
    return acc;
  }, {});
}

function semesterSort(keys) {
  return keys.slice().sort((a, b) => {
    const numA = parseInt(a) || 999;
    const numB = parseInt(b) || 999;
    if (numA !== numB) return numA - numB;
    const optA = a.toLowerCase().includes('optativ');
    const optB = b.toLowerCase().includes('optativ');
    if (optA !== optB) return optA ? 1 : -1;
    return a.localeCompare(b, 'pt-BR');
  });
}

/* ── Main ─────────────────────────────────────────────────────── */
async function load() {
  const subjects = await fetch('subjects.json').then(r => r.json());

  // Collect all unique bib paths and fetch in parallel
  const allBibPaths = new Set();
  subjects.forEach(s => s.reservas.forEach(b => { if (b.bibtex) allBibPaths.add(b.bibtex); }));

  const bibCache = {};
  await Promise.all([...allBibPaths].map(async path => {
    try {
      const res = await fetch(bibtexUrl(path));
      if (res.ok) bibCache[path] = parseBibtex(await res.text());
    } catch (_) {}
  }));

  const bySemester = groupBy(subjects, s => s.notas || 'Sem semestre');
  const semesterOrder = semesterSort(Object.keys(bySemester));
  const content = document.getElementById('content');

  for (const semester of semesterOrder) {
    const section = document.createElement('div');
    section.className = 'semester';

    const semTitle = document.createElement('div');
    semTitle.className = 'semester-title';
    semTitle.textContent = semester;
    section.appendChild(semTitle);

    for (const disc of bySemester[semester]) {
      const books = [...(disc.reservas ?? [])].sort((left, right) =>
        bookSortKey(left, bibCache).localeCompare(bookSortKey(right, bibCache), 'pt-BR')
      );

      const card = document.createElement('div');
      card.className = 'subject';

      const header = document.createElement('div');
      header.className = 'subject-header';

      const nameEl = document.createElement('div');
      nameEl.className = 'subject-name';
      nameEl.innerHTML = disc.urlReserva
        ? `<a href="${disc.urlReserva}" target="_blank">${disc.disciplina}</a>`
        : disc.disciplina;
      header.appendChild(nameEl);

      if (disc.instrutores?.length) {
        const inst = document.createElement('div');
        inst.className = 'subject-instructors';
        inst.textContent = disc.instrutores.join(', ');
        header.appendChild(inst);
      }

      card.appendChild(header);

      if (books.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-books';
        empty.textContent = 'Nenhum livro cadastrado.';
        card.appendChild(empty);
      } else {
        const booksEl = document.createElement('div');
        booksEl.className = 'books';

        for (const book of books) {
          const row = document.createElement('div');
          row.className = 'book';

          const citEl = document.createElement('div');
          citEl.className = 'book-citation';

          const bibFields = book.bibtex ? bibCache[book.bibtex] : null;
          const isbns = bookIsbns(book, bibFields);

          if (bibFields) {
            citEl.innerHTML = formatAbnt(bibFields, book.url || null, isbns);
          } else {
            // Fallback: compose from JSON fields
            const titleHtml = book.url
              ? `<strong><a href="${book.url}" target="_blank">${book.titulo}</a></strong>`
              : `<strong>${book.titulo}</strong>`;
            const citation = [book.autor, titleHtml, book.numeroChamada].filter(Boolean).join('. ') + '.';
            const isbnText = formatIsbns(isbns);
            citEl.innerHTML = [citation, isbnText].filter(Boolean).join(' ');
          }

          row.appendChild(citEl);

          const actions = document.createElement('div');
          actions.className = 'book-actions';

          if (book.disponiveis != null) {
            const badge = document.createElement('span');
            badge.className = 'badge ' + situacaoClass(book.situacao ?? '');
            badge.textContent = `${book.disponiveis} ex.`;
            badge.title = book.situacao ?? '';
            actions.appendChild(badge);
          }

          row.appendChild(actions);
          booksEl.appendChild(row);
        }

        card.appendChild(booksEl);
      }

      section.appendChild(card);
    }

    content.appendChild(section);
  }
}

load();
</script>
</body>
</html>
