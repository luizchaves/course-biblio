<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ementas - Bacharelado em Engenharia de Software</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .semester { margin-bottom: 32px; }

    .semester-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      border-bottom: 2px solid #ddd;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .subject {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .subject-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .subject-instructors { font-size: 0.8rem; color: #777; }

    .subject-content { padding: 4px 14px; }

    .subject-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 18px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #666;
      font-size: 0.78rem;
    }

    .subject-meta strong { color: #444; font-weight: 600; }

    .syllabus-section {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .syllabus-section:last-child { border-bottom: none; }

    .section-title {
      margin-bottom: 4px;
      color: #555;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-content {
      color: #222;
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .section-content p + p { margin-top: 6px; }

    .section-content ol,
    .section-content ul {
      padding-left: 22px;
    }

    .section-content li + li { margin-top: 3px; }

    .section-content a {
      color: #0060df;
      text-decoration: none;
    }

    .section-content a:hover { text-decoration: underline; }

    .koha-links {
      display: inline-flex;
      gap: 2px;
      margin-left: 4px;
      vertical-align: text-bottom;
    }

    .koha-link {
      display: inline-flex;
      padding: 2px;
      border-radius: 3px;
      color: #0060df;
    }

    .koha-link:hover { background: #eaf2ff; }

    .koha-link svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .loading,
    .error {
      padding: 14px;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
    }

    .error { color: #c00; }

    @media (max-width: 640px) {
      body { padding: 14px; }
    }
  </style>
</head>
<body>

<h1>Ementas — Bacharelado em Engenharia de Software</h1>
<div id="content"><div class="loading">Carregando ementas…</div></div>

<script>
/* ── Rendering helpers ───────────────────────────────────────── */
function normalizeLabel(value) {
  return value
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toLowerCase();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderText(value) {
  const links = [];
  let rendered = String(value ?? '').replace(/(\b(?:www\.)?[^\s()]+)[ \t]+\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
    const token = `@@LINK${links.length}@@`;
    links.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`);
    return token;
  });

  rendered = escapeHtml(rendered).replace(/https?:\/\/[^\s<)]+/g, rawUrl => {
    const suffix = rawUrl.match(/[.,;:]+$/)?.[0] ?? '';
    const url = suffix ? rawUrl.slice(0, -suffix.length) : rawUrl;
    return `<a href="${url}" target="_blank" rel="noopener">${url}</a>${suffix}`;
  });

  links.forEach((link, index) => {
    rendered = rendered.replace(`@@LINK${index}@@`, link);
  });
  return rendered;
}

function parseBibUrl(text) {
  const m = text.match(/\burl\s*=\s*\{([^}]+)\}/i);
  return m ? m[1].trim() : null;
}

async function fetchBibCache(subjects) {
  const paths = new Set();
  for (const subject of subjects) {
    for (const section of ['bibliografiaBasica', 'bibliografiaComplementar']) {
      for (const item of subject[section] ?? []) {
        if (item.bibtex?.[0]) paths.add(item.bibtex[0]);
      }
    }
  }
  const cache = {};
  await Promise.all([...paths].map(async path => {
    try {
      const r = await fetch('../' + path);
      if (r.ok) {
        const url = parseBibUrl(await r.text());
        if (url) cache[path] = url;
      }
    } catch {}
  }));
  return cache;
}

function renderBibliography(entries, bibCache) {
  if (!entries?.length) return '';
  return `<ol>${entries.map(item => {
    const urls = (item.bibtex ?? []).map(p => bibCache[p]).filter(Boolean);
    const kohaLinks = urls.map((url, index) => {
      const label = urls.length > 1
        ? `Abrir registro ${index + 1} no Koha`
        : 'Abrir registro no Koha';
      return `<a class="koha-link" href="${escapeHtml(url)}" target="_blank" rel="noopener" aria-label="${label}" title="${label}">
        <svg class="lucide lucide-external-link" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 3h6v6"></path>
          <path d="M10 14 21 3"></path>
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        </svg>
      </a>`;
    }).join('');
    const links = kohaLinks ? `<span class="koha-links">${kohaLinks}</span>` : '';
    return `<li>${renderText(item.referencia)}${links}</li>`;
  }).join('')}</ol>`;
}

function semesterSort(keys) {
  return keys.slice().sort((a, b) => {
    const numA = parseInt(a) || 999;
    const numB = parseInt(b) || 999;
    if (numA !== numB) return numA - numB;
    const optA = normalizeLabel(a).includes('optativ');
    const optB = normalizeLabel(b).includes('optativ');
    if (optA !== optB) return optA ? 1 : -1;
    return a.localeCompare(b, 'pt-BR');
  });
}

function renderSubject(subject, bibCache) {
  const type = subject.tipoDisciplina ?? '';
  const hours = subject.cargaHoraria;
  const prerequisites = subject.preRequisitos?.length
    ? subject.preRequisitos.join(', ')
    : 'Não há';
  const instructors = subject.docentes?.join(', ') ?? '';

  const card = document.createElement('article');
  card.className = 'subject';

  const header = document.createElement('div');
  header.className = 'subject-header';

  const name = document.createElement('div');
  name.className = 'subject-name';
  name.textContent = subject.disciplina;
  header.appendChild(name);

  if (instructors) {
    const instructor = document.createElement('div');
    instructor.className = 'subject-instructors';
    instructor.textContent = instructors;
    header.appendChild(instructor);
  }

  card.appendChild(header);

  const content = document.createElement('div');
  content.className = 'subject-content';

  const meta = document.createElement('div');
  meta.className = 'subject-meta';
  if (type) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Tipo:</strong> ${escapeHtml(type)}`;
    meta.appendChild(item);
  }
  if (hours != null) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Carga total:</strong> ${escapeHtml(hours)} h`;
    meta.appendChild(item);
  }
  if (prerequisites) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Pré-requisitos:</strong> ${escapeHtml(prerequisites)}`;
    meta.appendChild(item);
  }

  const workloadLabels = {
    teorica: 'Teórica',
    pratica: 'Prática',
    ead: 'EaD',
    extensao: 'Extensão',
  };
  for (const [key, value] of Object.entries(subject.distribuicaoCargaHoraria ?? {})) {
    if (value == null) continue;
    const item = document.createElement('span');
    item.innerHTML = `<strong>${workloadLabels[key] ?? escapeHtml(key)}:</strong> ${escapeHtml(value)} h`;
    meta.appendChild(item);
  }
  if (meta.children.length) content.appendChild(meta);

  const visibleSections = [
    { name: 'Ementa', html: subject.ementa ? `<p>${renderText(subject.ementa)}</p>` : '' },
    { name: 'Bibliografia Básica', html: renderBibliography(subject.bibliografiaBasica, bibCache) },
    { name: 'Bibliografia Complementar', html: renderBibliography(subject.bibliografiaComplementar, bibCache) },
    {
      name: 'Bibliografia Suplementar (Periódicos)',
      html: subject.bibliografiaSuplementar ? `<p>${renderText(subject.bibliografiaSuplementar)}</p>` : '',
    },
    { name: 'Observações', html: subject.observacoes ? `<p>${renderText(subject.observacoes)}</p>` : '' },
  ].filter(item => item.html);

  for (const item of visibleSections) {
    const section = document.createElement('section');
    section.className = 'syllabus-section';

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = item.name;
    section.appendChild(title);

    const body = document.createElement('div');
    body.className = 'section-content';
    body.innerHTML = item.html;
    section.appendChild(body);
    content.appendChild(section);
  }

  card.appendChild(content);
  return card;
}

/* ── Main ─────────────────────────────────────────────────────── */
async function load() {
  const content = document.getElementById('content');

  try {
    const response = await fetch('ementario.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const subjects = await response.json();
    const bibCache = await fetchBibCache(subjects);
    const groups = {};

    for (const subject of subjects) {
      const group = normalizeLabel(subject.tipoDisciplina).includes('optativ')
        ? 'Disciplinas optativas'
        : subject.periodo;
      (groups[group] ??= []).push(subject);
    }

    content.replaceChildren();
    for (const groupName of semesterSort(Object.keys(groups))) {
      const wrapper = document.createElement('section');
      wrapper.className = 'semester';

      const title = document.createElement('div');
      title.className = 'semester-title';
      title.textContent = groupName;
      wrapper.appendChild(title);

      groups[groupName]
        .sort((left, right) => left.disciplina.localeCompare(right.disciplina, 'pt-BR'))
        .forEach(subject => wrapper.appendChild(renderSubject(subject, bibCache)));
      content.appendChild(wrapper);
    }
  } catch (error) {
    content.innerHTML = '<div class="error">Não foi possível carregar o ementário.</div>';
    console.error(error);
  }
}

load();
</script>
</body>
</html>
