<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ementas - Bacharelado em Engenharia de Software</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .semester { margin-bottom: 32px; display: none; }
    .semester.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }

    .semester-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      border-bottom: 2px solid #ddd;
      padding-bottom: 6px;
      margin-bottom: 12px;

    .subject {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .subject-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .subject-instructors { font-size: 0.8rem; color: #777; }

    .subject-content { padding: 4px 14px; }

    .subject-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 18px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #666;
      font-size: 0.78rem;
    }

    .subject-meta strong { color: #444; font-weight: 600; }

    .syllabus-section {
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .syllabus-section:last-child { border-bottom: none; }

    .section-title {
      margin-bottom: 4px;
      color: #555;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-content {
      color: #222;
      font-size: 0.84rem;
      line-height: 1.55;
    }

    .section-content p + p { margin-top: 6px; }

    .section-content ol,
    .section-content ul {
      padding-left: 22px;
    }

    .section-content li + li { margin-top: 3px; }

    .section-content a {
      color: #0060df;
      text-decoration: none;
    }

    .section-content a:hover { text-decoration: underline; }

    .koha-links {
      display: inline-flex;
      vertical-align: middle;
      align-items: center;
      gap: 2px;
      margin-left: 4px;
    }

    .koha-link {
      display: inline-flex;
      padding: 2px;
      border-radius: 3px;
      color: #0060df;
      background: #eaf2ff;
      text-decoration: none;
    }

    .koha-link:hover { background: #cfe2ff; }

    .koha-link-disabled {
      color: #d93025;
      background: #fce8e6;
      cursor: not-allowed;
    }

    .copies-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
      vertical-align: middle;
      margin-left: 5px;
    }

    .copies-badge-none { background: #fce8e6; color: #c5221f; }
    .copies-badge-few  { background: #fef7e0; color: #7a5100; }
    .copies-badge-ok   { background: #e6f4ea; color: #1e6a35; }

    .koha-link svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .loading,
    .error {
      padding: 14px;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
    }

    .error { color: #c00; }

    .ref-original { color: #aaa; text-decoration: line-through; }
    .ref-abnt { margin-top: 4px; }
    .ref-abnt strong { font-weight: 600; }

    .tabs-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 8px;
    }

    .tab-button {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      background: transparent;
      border: none;
      padding: 5px 12px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-button:hover {
      background: #eaf2ff;
      color: #0060df;
    }

    .tab-button.active {
      background: #0060df;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 96, 223, 0.2);
    }

    .tab-button.active .copies-badge {
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
    }

    .filters-container {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin: -4px 0 16px;
    }

    .filter-label {
      color: #666;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .filter-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-button {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #555;
      background: #fff;
      border: 1px solid #d8d8d8;
      border-radius: 15px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 5px 12px;
      transition: all 0.2s ease;
    }

    .filter-button:hover {
      background: #eaf2ff;
      color: #0060df;
    }

    .filter-button.active {
      background: #0060df;
      color: #fff;
    }

    .filter-button.active .copies-badge {
      background: rgba(255, 255, 255, 0.22);
      color: #fff;
    }

    .filter-empty {
      padding: 14px;
      color: #777;
      font-style: italic;
      font-size: 0.85rem;
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
    }
  </style>
</head>
<body>

<h1 id="page-title">Ementas — Bacharelado em Engenharia de Software</h1>
<div id="content"><div class="loading">Carregando ementas…</div></div>

<script>
/* ── Rendering helpers ───────────────────────────────────────── */
function normalizeLabel(value) {
  return value
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toLowerCase();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderText(value) {
  const links = [];
  let rendered = String(value ?? '').replace(/(\b(?:www\.)?[^\s()]+)[ \t]+\((https?:\/\/[^)]+)\)/g, (_, label, url) => {
    const token = `@@LINK${links.length}@@`;
    links.push(`<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(label)}</a>`);
    return token;
  });

  rendered = escapeHtml(rendered).replace(/https?:\/\/[^\s<)]+/g, rawUrl => {
    const suffix = rawUrl.match(/[.,;:]+$/)?.[0] ?? '';
    const url = suffix ? rawUrl.slice(0, -suffix.length) : rawUrl;
    return `<a href="${url}" target="_blank" rel="noopener">${url}</a>${suffix}`;
  });

  links.forEach((link, index) => {
    rendered = rendered.replace(`@@LINK${index}@@`, link);
  });
  return rendered;
}

function extractOnlineUrl(reference) {
  const marker = 'Disponível em';
  const text = String(reference ?? '');
  const markerIndex = text.indexOf(marker);
  if (markerIndex === -1) return null;

  const onlinePart = text
    .slice(markerIndex + marker.length)
    .replace(/\\([<&])/g, '$1')
    .replace(/([/-])\s+(?=[\w])/g, '$1');
  const match = onlinePart.match(/(?:https?:\/\/|www\.)[^\s<>()]+/i);
  if (!match) return null;

  const url = match[0].replace(/[.,;:]+$/, '');
  return url.startsWith('www.') ? `https://${url}` : url;
}

function isBibliographyAvailable(item) {
  const onlineAvailable = item.online === true && item.onlineAcessivel !== false;
  const physicalAvailable = item.quantidadeEmJP != null && item.quantidadeEmJP > 0;
  return onlineAvailable || physicalAvailable;
}

function getBibliographyState(item, bibCache) {
  const bibtexPaths = item.bibtex ?? [];
  const isBibtexMissing = bibtexPaths.length === 0;
  const firstBib = bibtexPaths.map(p => bibCache[p]?.bib).find(Boolean);
  const onlineUrl = item.online
    ? extractOnlineUrl(item.referencia) ?? firstBib?.url ?? null
    : null;
  const onlineAvailable = item.online === true && item.onlineAcessivel !== false;
  const kohaUrls = item.online
    ? []
    : bibtexPaths.map(p => bibCache[p]?.url).filter(Boolean);
  const externalLinks = kohaUrls.map((url, index) => ({
    url,
    label: kohaUrls.length > 1
      ? `Abrir registro ${index + 1} no Koha`
      : 'Abrir registro no Koha',
  }));
  if (onlineUrl && onlineAvailable) {
    externalLinks.push({
      url: onlineUrl,
      label: 'Abrir referência online',
    });
  }

  const hasLinkOff = !isBibtexMissing && externalLinks.length === 0;
  const isAbsentInJP = item.quantidadeEmJP === 0;
  const isAbsent = isBibtexMissing || hasLinkOff || isAbsentInJP;
  const absentReason = isBibtexMissing
    ? 'Nenhum registro BibTeX cadastrado'
    : hasLinkOff
      ? 'Link indisponível'
      : 'Nenhum exemplar em JP';

  return {
    bibtexPaths,
    isBibtexMissing,
    firstBib,
    onlineUrl,
    onlineAvailable,
    externalLinks,
    hasLinkOff,
    isAbsentInJP,
    isAbsent,
    absentReason,
  };
}

function isBibliographyAbsent(item, bibCache) {
  return getBibliographyState(item, bibCache).isAbsent;
}

function getBibliographyFilterValue(filterId) {
  const values = {
    absent: 'ausentes',
    nonAbsent: 'nao-ausentes',
    missingBibtex: 'sem-bibtex',
    linkOff: '404',
    noCopies: 'sem-exemplar',
  };
  return values[filterId] ?? null;
}

function getBibliographyFilterId(value) {
  const filterIds = {
    ausentes: 'absent',
    'nao-ausentes': 'nonAbsent',
    'sem-bibtex': 'missingBibtex',
    '404': 'linkOff',
    'sem-exemplar': 'noCopies',
  };
  return filterIds[value] ?? 'all';
}

function matchesBibliographyFilter(item, bibCache, bibliographyFilter) {
  if (bibliographyFilter === 'all') return true;

  const state = getBibliographyState(item, bibCache);
  if (bibliographyFilter === 'absent') return state.isAbsent;
  if (bibliographyFilter === 'nonAbsent') return !state.isAbsent;
  if (bibliographyFilter === 'missingBibtex') return state.isBibtexMissing;
  if (bibliographyFilter === 'linkOff') return state.hasLinkOff;
  if (bibliographyFilter === 'noCopies') return state.isAbsentInJP;
  return true;
}

function parseBibtex(text) {
  const result = {};
  const re = /(\w+)\s*=\s*\{([^{}]*(?:\{[^{}]*\}[^{}]*)*)\}/gi;
  let m;
  while ((m = re.exec(text)) !== null) {
    result[m[1].toLowerCase()] = m[2].trim();
  }
  return result;
}

async function fetchBibCache(subjects) {
  const paths = new Set();
  for (const subject of subjects) {
    for (const item of subject.bibliografias ?? []) {
      for (const path of item.bibtex ?? []) {
        if (path) paths.add(path);
      }
    }
  }
  const cache = {};
  await Promise.all([...paths].map(async path => {
    try {
      const r = await fetch('../' + path);
      if (r.ok) {
        const bib = parseBibtex(await r.text());
        cache[path] = { url: bib.url ?? null, bib };
      }
    } catch {}
  }));
  return cache;
}

function formatABNT(bib, onlineUrl = null) {
  if (!bib?.title) return '';

  const clean = s => (s ?? '').replace(/\s*[-,;:/\\]\s*$/, '').replace(/\s*\.\s*$/, '').trim();

  const authorStr = (bib.author ?? '').replace(/\s+/g, ' ').trim();
  let authorsABNT = '';
  if (authorStr) {
    const parts = authorStr.split(/\s+and\s+/i).map(a => a.trim()).filter(Boolean);
    const fmt = parts.map(a => {
      const [last, ...rest] = a.split(',').map(s => s.trim());
      return rest.length > 0 ? `${last.toUpperCase()}, ${rest.join(' ')}` : a.toUpperCase();
    });
    authorsABNT = fmt.length > 3 ? fmt[0] + ' et al.' : fmt.join('; ');
  }

  const title     = clean(bib.title);
  const edition   = clean(bib.edition ?? '');
  const address   = clean(bib.address ?? '');
  const publisher = clean(bib.publisher ?? '');
  const year      = clean(bib.year ?? '');
  const isbn      = bib.isbn ? bib.isbn.split(',')[0].trim() : '';

  const parts = [];
  if (authorsABNT) parts.push(escapeHtml(authorsABNT) + '.');
  if (title)       parts.push(`<strong>${escapeHtml(title)}</strong>.`);
  if (edition)     parts.push(escapeHtml(edition) + '.');
  if (address && publisher) {
    parts.push(`${escapeHtml(address)}: ${escapeHtml(publisher)}, ${escapeHtml(year)}.`);
  } else if (publisher) {
    parts.push(`${escapeHtml(publisher)}, ${escapeHtml(year)}.`);
  } else if (year) {
    parts.push(escapeHtml(year) + '.');
  }
  if (isbn) parts.push(`ISBN ${escapeHtml(isbn)}.`);
  if (onlineUrl) {
    const escapedUrl = escapeHtml(onlineUrl);
    parts.push(`Disponível em: <a href="${escapedUrl}" target="_blank" rel="noopener">${escapedUrl}</a>.`);
  }

  return parts.join(' ');
}

function renderBibliography(entries, bibCache) {
  if (!entries?.length) return '';
  return `<ol>${entries.map(item => {
    const state = getBibliographyState(item, bibCache);

    let linksHtml = '';
    if (state.externalLinks.length > 0) {
      linksHtml = state.externalLinks.map(link => {
        return `<a class="koha-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener" aria-label="${link.label}" title="${link.label}">
          <svg class="lucide lucide-external-link" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h6v6"></path>
            <path d="M10 14 21 3"></path>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          </svg>
        </a>`;
      }).join('');
    } else if (item.online && !state.onlineAvailable) {
      const label = 'Referência online indisponível';
      linksHtml = `<span class="koha-link koha-link-disabled" title="${label}" aria-label="${label}">
        <svg class="lucide lucide-link-2-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 17H7A5 5 0 0 1 7 7h2"></path>
          <path d="M15 7h2a5 5 0 1 1 0 10h-2"></path>
          <line x1="8" x2="16" y1="12" y2="12"></line>
          <line x1="2" x2="22" y1="2" y2="22"></line>
        </svg>
      </span>`;
    } else if (!state.isBibtexMissing) {
      const label = 'Registro indisponível no Koha';
      linksHtml = `<span class="koha-link koha-link-disabled" title="${label}" aria-label="${label}">
        <svg class="lucide lucide-link-2-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 17H7A5 5 0 0 1 7 7h2"></path>
          <path d="M15 7h2a5 5 0 1 1 0 10h-2"></path>
          <line x1="8" x2="16" y1="12" y2="12"></line>
          <line x1="2" x2="22" y1="2" y2="22"></line>
        </svg>
      </span>`;
    }
    const links = linksHtml ? `<span class="koha-links">${linksHtml}</span>` : '';

    let copiesBadge = '';
    if (item.quantidadeEmJP != null) {
      const n = item.quantidadeEmJP;
      const cls = n === 0 ? 'copies-badge-none' : n <= 2 ? 'copies-badge-few' : 'copies-badge-ok';
      const label = n === 0 ? 'Nenhum exemplar em JP' : n === 1 ? '1 exemplar em JP' : `${n} exemplares em JP`;
      copiesBadge = `<span class="copies-badge ${cls}" title="${label}">${n} ex. JP</span>`;
    }

    const absentBadge = state.isAbsent
      ? `<span class="copies-badge copies-badge-none" title="${state.absentReason}">Ausente</span>`
      : '';

    const abntHtml = formatABNT(state.firstBib, state.onlineUrl);
    const refHtml = abntHtml
      ? `<span class="ref-original">${renderText(item.referencia)}</span><div class="ref-abnt">${abntHtml}</div>`
      : renderText(item.referencia);

    return `<li>${refHtml}${copiesBadge}${absentBadge}${links}</li>`;
  }).join('')}</ol>`;
}

function semesterSort(keys) {
  return keys.slice().sort((a, b) => {
    const numA = parseInt(a) || 999;
    const numB = parseInt(b) || 999;
    if (numA !== numB) return numA - numB;
    const optA = normalizeLabel(a).includes('optativ');
    const optB = normalizeLabel(b).includes('optativ');
    if (optA !== optB) return optA ? 1 : -1;
    return a.localeCompare(b, 'pt-BR');
  });
}

function getVisibleBibliographies(subject, bibCache, bibliographyFilter) {
  const bibliographies = subject.bibliografias ?? [];
  return bibliographies.filter(item => matchesBibliographyFilter(item, bibCache, bibliographyFilter));
}

function renderSubject(subject, bibCache, bibliographyFilter = 'all') {
  const type = subject.tipoDisciplina ?? '';
  const hours = subject.cargaHoraria;
  const prerequisites = subject.preRequisitos?.length
    ? subject.preRequisitos.join(', ')
    : 'Não há';
  const instructors = subject.docentes?.join(', ') ?? '';

  const card = document.createElement('article');
  card.className = 'subject';

  const header = document.createElement('div');
  header.className = 'subject-header';

  const name = document.createElement('div');
  name.className = 'subject-name';
  name.textContent = subject.disciplina;

  const bibs = subject.bibliografias ?? [];
  const total = bibs.length;
  const available = bibs.filter(isBibliographyAvailable).length;
  if (total > 0) {
    const cls = available === 0 ? 'copies-badge-none' : available < total ? 'copies-badge-few' : 'copies-badge-ok';
    const label = `${available} de ${total} referências disponíveis em João Pessoa ou online`;
    const badge = document.createElement('span');
    badge.className = `copies-badge ${cls}`;
    badge.title = label;
    badge.textContent = `${available}/${total}`;
    name.appendChild(badge);
  }

  header.appendChild(name);

  if (instructors) {
    const instructor = document.createElement('div');
    instructor.className = 'subject-instructors';
    instructor.textContent = instructors;
    header.appendChild(instructor);
  }

  card.appendChild(header);

  const content = document.createElement('div');
  content.className = 'subject-content';

  const meta = document.createElement('div');
  meta.className = 'subject-meta';
  if (type) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Tipo:</strong> ${escapeHtml(type)}`;
    meta.appendChild(item);
  }
  if (hours != null) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Carga total:</strong> ${escapeHtml(hours)} h`;
    meta.appendChild(item);
  }
  if (prerequisites) {
    const item = document.createElement('span');
    item.innerHTML = `<strong>Pré-requisitos:</strong> ${escapeHtml(prerequisites)}`;
    meta.appendChild(item);
  }

  const workloadLabels = {
    teorica: 'Teórica',
    pratica: 'Prática',
    ead: 'EaD',
    extensao: 'Extensão',
  };
  for (const [key, value] of Object.entries(subject.distribuicaoCargaHoraria ?? {})) {
    if (value == null) continue;
    const item = document.createElement('span');
    item.innerHTML = `<strong>${workloadLabels[key] ?? escapeHtml(key)}:</strong> ${escapeHtml(value)} h`;
    meta.appendChild(item);
  }
  if (meta.children.length) content.appendChild(meta);

  const visibleBibliographies = getVisibleBibliographies(subject, bibCache, bibliographyFilter);
  const showOnlyFilteredBibliographies = bibliographyFilter !== 'all';
  const visibleSections = [
    { name: 'Ementa', html: !showOnlyFilteredBibliographies && subject.ementa ? `<p>${renderText(subject.ementa)}</p>` : ''},
    { name: 'Bibliografia Básica', html: renderBibliography(visibleBibliographies.filter(item => item.tipo === 'basica'), bibCache)},
    { name: 'Bibliografia Complementar', html: renderBibliography(visibleBibliographies.filter(item => item.tipo === 'complementar'), bibCache)},
    {
      name: 'Bibliografia Suplementar (Periódicos)',
      html: !showOnlyFilteredBibliographies && subject.bibliografiaSuplementar ? `<p>${renderText(subject.bibliografiaSuplementar)}</p>` : '',
    },
    { name: 'Observações', html: !showOnlyFilteredBibliographies && subject.observacoes ? `<p>${renderText(subject.observacoes)}</p>` : ''},
  ].filter(item => item.html);

  for (const item of visibleSections) {
    const section = document.createElement('section');
    section.className = 'syllabus-section';

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = item.name;
    section.appendChild(title);

    const body = document.createElement('div');
    body.className = 'section-content';
    body.innerHTML = item.html;
    section.appendChild(body);
    content.appendChild(section);
  }

  card.appendChild(content);
  return card;
}

function renderSemesterSection(section, subjects, bibCache, bibliographyFilter) {
  section.replaceChildren();
  const sortedSubjects = subjects
    .slice()
    .sort((left, right) => left.disciplina.localeCompare(right.disciplina, 'pt-BR'));
  const visibleSubjects = bibliographyFilter !== 'all'
    ? sortedSubjects.filter(subject => getVisibleBibliographies(subject, bibCache, bibliographyFilter).length > 0)
    : sortedSubjects;

  if (visibleSubjects.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'filter-empty';
    empty.textContent = 'Nenhuma bibliografia para este filtro neste período.';
    section.appendChild(empty);
    return;
  }

  visibleSubjects.forEach(subject => {
    section.appendChild(renderSubject(subject, bibCache, bibliographyFilter));
  });
}

/* ── Main ─────────────────────────────────────────────────────── */
async function load() {
  const content = document.getElementById('content');

  try {
    const response = await fetch('ementario.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const subjects = await response.json();
    const bibCache = await fetchBibCache(subjects);

    const allBibs = subjects.flatMap(s => s.bibliografias ?? []);
    const totalBibs = allBibs.length;
    const totalAvailable = allBibs.filter(isBibliographyAvailable).length;
    if (totalBibs > 0) {
      const cls = totalAvailable === 0 ? 'copies-badge-none' : totalAvailable < totalBibs ? 'copies-badge-few' : 'copies-badge-ok';
      const badge = document.createElement('span');
      badge.className = `copies-badge ${cls}`;
      badge.title = `${totalAvailable} de ${totalBibs} referências disponíveis em João Pessoa ou online`;
      badge.textContent = `${totalAvailable}/${totalBibs}`;
      document.getElementById('page-title').appendChild(badge);
    }
    const groups = {};

    for (const subject of subjects) {
      const group = normalizeLabel(subject.tipoDisciplina).includes('optativ')
        ? 'Optativas'
        : subject.periodo;
      (groups[group] ??= []).push(subject);
    }

    const getTabSlug = name => {
      const match = name.match(/(\d+)/);
      if (match) return 'p' + match[1];
      const norm = normalizeLabel(name);
      if (norm.includes('opt')) return 'optativas';
      return norm.replace(/\s+/g, '-');
    };
    const urlParams = new URLSearchParams(window.location.search);
    const initialTabSlug = urlParams.get('tab');
    let activeBibliographyFilter = getBibliographyFilterId(urlParams.get('bibliografias'));

    content.replaceChildren();

    const tabsContainer = document.createElement('div');
    tabsContainer.className = 'tabs-container';
    content.appendChild(tabsContainer);

    const filtersContainer = document.createElement('div');
    filtersContainer.className = 'filters-container';

    const filterLabel = document.createElement('span');
    filterLabel.className = 'filter-label';
    filterLabel.textContent = 'Bibliografias';
    filtersContainer.appendChild(filterLabel);

    const filterGroup = document.createElement('div');
    filterGroup.className = 'filter-group';
    filtersContainer.appendChild(filterGroup);
    content.appendChild(filtersContainer);

    const semesterKeys = semesterSort(Object.keys(groups));
    const sections = [];
    const buttons = [];
    const filterButtons = [];

    const renderAllSemesterSections = () => {
      semesterKeys.forEach((groupName, index) => {
        renderSemesterSection(sections[index], groups[groupName], bibCache, activeBibliographyFilter);
      });
    };

    const updateFilterButtons = () => {
      filterButtons.forEach(button => {
        const active = button.dataset.filter === activeBibliographyFilter;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
      });
    };

    const bibliographyFilterOptions = [
      { id: 'all', label: 'Todas', count: totalBibs, badgeClass: 'copies-badge-ok' },
      {
        id: 'nonAbsent',
        label: 'Não ausentes',
        count: allBibs.filter(item => matchesBibliographyFilter(item, bibCache, 'nonAbsent')).length,
        badgeClass: 'copies-badge-ok',
      },
      {
        id: 'absent',
        label: 'Ausentes',
        count: allBibs.filter(item => matchesBibliographyFilter(item, bibCache, 'absent')).length,
        badgeClass: 'copies-badge-none',
      },
      {
        id: 'missingBibtex',
        label: 'Ausente s/ BibTeX',
        count: allBibs.filter(item => matchesBibliographyFilter(item, bibCache, 'missingBibtex')).length,
        badgeClass: 'copies-badge-none',
      },
      {
        id: 'linkOff',
        label: 'Ausente 404',
        count: allBibs.filter(item => matchesBibliographyFilter(item, bibCache, 'linkOff')).length,
        badgeClass: 'copies-badge-none',
      },
      {
        id: 'noCopies',
        label: 'Ausente s/ exemplar',
        count: allBibs.filter(item => matchesBibliographyFilter(item, bibCache, 'noCopies')).length,
        badgeClass: 'copies-badge-none',
      },
    ];

    bibliographyFilterOptions.forEach(option => {
      const btn = document.createElement('button');
      btn.className = 'filter-button';
      btn.type = 'button';
      btn.dataset.filter = option.id;
      btn.textContent = option.label;
      btn.setAttribute('aria-label', `${option.label}: ${option.count}`);

      const badge = document.createElement('span');
      badge.className = `copies-badge ${option.badgeClass}`;
      badge.setAttribute('aria-hidden', 'true');
      badge.textContent = option.count;
      btn.appendChild(badge);

      btn.addEventListener('click', () => {
        if (activeBibliographyFilter === option.id) return;
        activeBibliographyFilter = option.id;
        updateFilterButtons();
        renderAllSemesterSections();

        const url = new URL(window.location);
        const filterValue = getBibliographyFilterValue(activeBibliographyFilter);
        if (filterValue) {
          url.searchParams.set('bibliografias', filterValue);
        } else {
          url.searchParams.delete('bibliografias');
        }
        window.history.replaceState({}, '', url);
      });

      filterGroup.appendChild(btn);
      filterButtons.push(btn);
    });

    semesterKeys.forEach((groupName, idx) => {
      const section = document.createElement('section');
      section.className = 'semester';
      section.id = `semester-${idx}`;

      content.appendChild(section);
      sections.push(section);

      const btn = document.createElement('button');
      btn.className = 'tab-button';
      btn.textContent = groupName;

      const groupBibs = groups[groupName].flatMap(s => s.bibliografias ?? []);
      const gTotal = groupBibs.length;
      const gAvailable = groupBibs.filter(isBibliographyAvailable).length;
      if (gTotal > 0) {
        const cls = gAvailable === 0 ? 'copies-badge-none' : gAvailable < gTotal ? 'copies-badge-few' : 'copies-badge-ok';
        const gbadge = document.createElement('span');
        gbadge.className = `copies-badge ${cls}`;
        gbadge.title = `${gAvailable} de ${gTotal} referências disponíveis em João Pessoa ou online`;
        gbadge.textContent = `${gAvailable}/${gTotal}`;
        btn.appendChild(gbadge);
      }

      const slug = getTabSlug(groupName);
      btn.dataset.slug = slug;

      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        section.classList.add('active');

        const url = new URL(window.location);
        url.searchParams.set('tab', slug);
        window.history.replaceState({}, '', url);
      });

      tabsContainer.appendChild(btn);
      buttons.push(btn);
    });

    renderAllSemesterSections();
    updateFilterButtons();

    let activeIdx = 0;
    if (initialTabSlug) {
      const foundIdx = semesterKeys.findIndex(name => getTabSlug(name) === initialTabSlug);
      if (foundIdx !== -1) {
        activeIdx = foundIdx;
      }
    }

    if (buttons[activeIdx]) {
      buttons[activeIdx].classList.add('active');
      sections[activeIdx].classList.add('active');
    }
  } catch (error) {
    content.innerHTML = '<div class="error">Não foi possível carregar o ementário.</div>';
    console.error(error);
  }
}

load();
</script>
</body>
</html>
