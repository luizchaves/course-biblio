<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bibliografia - Bacharelado em Engenharia de Software</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #f5f5f5;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .semester { margin-bottom: 32px; display: none; }
    .semester.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .semester-title {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #555;
      border-bottom: 2px solid #ddd;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .subject {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .subject-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 14px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-wrap: wrap;
    }

    .subject-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .subject-instructors { font-size: 0.8rem; color: #777; }

    .books { padding: 4px 14px; }

    .book {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .book:last-child { border-bottom: none; }

    .book-citation {
      flex: 1;
      min-width: 0;
      font-size: 0.84rem;
      line-height: 1.55;
      color: #222;
    }

    .book-citation a {
      color: inherit;
      text-decoration: none;
    }

    .book-citation a:hover { text-decoration: underline; color: #0060df; }

    .badge {
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .badge-basic { background: #d4edda; color: #155724; }
    .badge-complementary { background: #fff3cd; color: #856404; }
    .badge-count { background: #e8f0fe; color: #1a73e8; border: 1px solid #d2e3fc; font-weight: 600; margin-left: 6px; display: inline-block; vertical-align: middle; }

    .koha-links {
      display: inline-flex;
      vertical-align: middle;
      align-items: center;
      gap: 2px;
      margin-left: 4px;
    }

    .koha-link {
      display: inline-flex;
      padding: 2px;
      border-radius: 3px;
      color: #0060df;
      background: #eaf2ff;
      text-decoration: none;
    }

    .koha-link:hover { background: #cfe2ff; }

    .bib-link {
      font-size: 0.72rem;
      font-family: monospace;
      white-space: nowrap;
      color: #0060df;
      text-decoration: none;
      border: 1px solid #c8d8f0;
      background: #f0f5ff;
      padding: 1px 6px;
      border-radius: 3px;
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
    }

    .bib-link:hover { background: #dce9ff; }

    .ref-abnt {
      margin-top: 4px;
    }

    .koha-link-disabled {
      color: #d93025;
      background: #fce8e6;
      cursor: not-allowed;
    }

    .koha-link svg {
      width: 13px;
      height: 13px;
      stroke-width: 2;
    }

    .no-books,
    .loading,
    .error {
      padding: 8px 14px;
      color: #999;
      font-style: italic;
      font-size: 0.85rem;
    }

    .loading,
    .error { padding: 14px; }
    .error { color: #c00; }

    .tabs-container {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 8px;
    }

    .tab-button {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      background: transparent;
      border: none;
      padding: 5px 12px;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tab-button:hover {
      background: #eaf2ff;
      color: #0060df;
    }

    .tab-button.active {
      background: #0060df;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0, 96, 223, 0.2);
    }

    @media (max-width: 640px) {
      body { padding: 14px; }
    }
  </style>
</head>
<body>

<h1>Bibliografia — Bacharelado em Engenharia de Software</h1>
<div id="content"><div class="loading">Carregando bibliografia…</div></div>

<script>
/* ── Render helpers ───────────────────────────────────────────── */
function normalizeLabel(value) {
  return String(value ?? '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .trim()
    .toLowerCase();
}

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderText(value) {
  return escapeHtml(value).replace(/https?:\/\/[^\s<)]+/g, rawUrl => {
    const suffix = rawUrl.match(/[.,;:]+$/)?.[0] ?? '';
    const url = suffix ? rawUrl.slice(0, -suffix.length) : rawUrl;
    return `<a href="${url}" target="_blank" rel="noopener">${url}</a>${suffix}`;
  });
}

function parseBibtex(raw) {
  const headerMatch = raw.match(/@(\w+)\s*\{([^,\s]*)\s*,/);
  if (!headerMatch) return {};

  const fields = {
    _type: headerMatch[1].toLowerCase(),
    _key: headerMatch[2],
  };

  let pos = raw.indexOf(',', raw.indexOf('{')) + 1;

  while (pos < raw.length) {
    while (pos < raw.length && /\s/.test(raw[pos])) pos++;
    if (raw[pos] === '}' || pos >= raw.length) break;

    const nameStart = pos;
    while (pos < raw.length && /\w/.test(raw[pos])) pos++;
    const name = raw.slice(nameStart, pos).toLowerCase();
    if (!name) break;

    while (pos < raw.length && /[\s=]/.test(raw[pos])) pos++;

    let value = '';
    if (raw[pos] === '{') {
      pos++;
      let depth = 1;
      const valStart = pos;
      while (pos < raw.length && depth > 0) {
        if (raw[pos] === '{') depth++;
        else if (raw[pos] === '}') depth--;
        pos++;
      }
      value = raw.slice(valStart, pos - 1).trim();
    } else if (raw[pos] === '"') {
      pos++;
      const valStart = pos;
      while (pos < raw.length && raw[pos] !== '"') pos++;
      value = raw.slice(valStart, pos).trim();
      pos++;
    }

    if (name) fields[name] = value;
    while (pos < raw.length && (raw[pos] === ',' || /\s/.test(raw[pos]))) pos++;
  }

  return fields;
}

function formatIsbns(isbns) {
  if (!isbns || isbns.length === 0) return '';
  
  let bestIsbn = isbns[0];
  let bestLen = String(bestIsbn).replace(/[^0-9X]/gi, '').length;
  
  for (let i = 1; i < isbns.length; i++) {
    const norm = String(isbns[i]).replace(/[^0-9X]/gi, '');
    if (norm.length > bestLen) {
      bestIsbn = isbns[i];
      bestLen = norm.length;
    }
  }

  const normalized = String(bestIsbn).toUpperCase().replace(/[^0-9X]/g, '');
  return `ISBN ${normalized}.`;
}

function getBibIsbns(fields) {
  const val = fields?.isbn;
  if (!val) return [];
  return [...new Set(val.split(/\s*[,;]\s*/).map(String).map(isbn => isbn.trim()).filter(Boolean))];
}

function formatAbnt(fields, kohaUrl, isbns = []) {
  const clean = s => s ? s.replace(/[\/,]+$/, '').replace(/\s*:\s*$/, '').replace(/\s*-\s*$/, '').trim() : '';
  const cleanYear = s => s ? s.replace(/^c/, '').replace(/\.$/, '').trim() : '';

  let authorsHtml = '';
  if (fields.author) {
    const authors = fields.author.split(/\s+and\s+/i).map(a => a.replace(/,\s*$/, '').trim()).filter(Boolean);
    const toAbnt = a => {
      const i = a.indexOf(',');
      if (i === -1) return a.toUpperCase();
      return `${a.slice(0, i).trim().toUpperCase()}, ${a.slice(i + 1).trim()}`;
    };
    const list = authors.length > 3
      ? [toAbnt(authors[0]), 'et al.']
      : authors.map(toAbnt);
    authorsHtml = list.join('; ');
  }

  const titleText = clean(fields.title);
  let titleHtml = titleText ? `<strong>${titleText}</strong>` : '';
  if (titleHtml && kohaUrl) {
    titleHtml = `<strong><a href="${kohaUrl}" target="_blank">${titleText}</a></strong>`;
  }

  const edition = clean(fields.edition);
  const address = clean(fields.address);
  const publisher = clean(fields.publisher);
  const year = cleanYear(fields.year);

  const location = [address, [publisher, year].filter(Boolean).join(', ')].filter(Boolean).join(': ');

  const parts = [authorsHtml, titleHtml, edition, location].filter(Boolean);
  const citation = parts.reduce((acc, part, i) => {
    if (i === 0) return part;
    return acc + (acc.endsWith('.') ? ' ' : '. ') + part;
  }, '');
  const normalizedCitation = citation.endsWith('.') ? citation : citation + '.';
  const isbnText = formatIsbns(isbns);
  return [normalizedCitation, isbnText].filter(Boolean).join(' ');
}

async function fetchBibCache(subjects) {
  const paths = new Set();
  for (const subject of subjects) {
    for (const item of subject.bibliografias ?? []) {
      for (const path of item.bibtex ?? []) {
        if (path) paths.add(path);
      }
    }
  }
  const cache = {};
  await Promise.all([...paths].map(async path => {
    try {
      const r = await fetch('../' + path);
      if (r.ok) {
        cache[path] = parseBibtex(await r.text());
      }
    } catch {}
  }));
  return cache;
}

function renderKohaLinks(bibPaths, bibCache) {
  const paths = bibPaths ?? [];
  const activeUrls = [];
  for (const path of paths) {
    const bib = bibCache[path];
    const url = bib?.url;
    if (url) {
      activeUrls.push(url);
    }
  }

  if (activeUrls.length > 0) {
    return `<div class="koha-links">${activeUrls.map((url, index) => {
      const label = activeUrls.length > 1
        ? `Abrir registro ${index + 1} no Koha`
        : 'Abrir registro no Koha';
      return `<a class="koha-link" href="${escapeHtml(url)}" target="_blank" rel="noopener" aria-label="${label}" title="${label}">
        <svg class="lucide lucide-external-link" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 3h6v6"></path>
          <path d="M10 14 21 3"></path>
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        </svg>
      </a>`;
    }).join('')}</div>`;
  }

  const label = paths.length > 0
    ? 'Registro indisponível no Koha'
    : 'Sem registro BibTeX cadastrado';

  return `<div class="koha-links">
    <span class="koha-link koha-link-disabled" title="${label}" aria-label="${label}">
      <svg class="lucide lucide-link-2-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 17H7A5 5 0 0 1 7 7h2"></path>
        <path d="M15 7h2a5 5 0 1 1 0 10h-2"></path>
        <line x1="8" x2="16" y1="12" y2="12"></line>
        <line x1="2" x2="22" y1="2" y2="22"></line>
      </svg>
    </span>
  </div>`;
}

function semesterSort(keys) {
  return keys.slice().sort((left, right) => {
    const leftNumber = parseInt(left) || 999;
    const rightNumber = parseInt(right) || 999;
    if (leftNumber !== rightNumber) return leftNumber - rightNumber;
    const leftElective = normalizeLabel(left).includes('optativ');
    const rightElective = normalizeLabel(right).includes('optativ');
    if (leftElective !== rightElective) return leftElective ? 1 : -1;
    return left.localeCompare(right, 'pt-BR');
  });
}

function renderSubject(subject, bibCache) {
  const references = (subject.bibliografias ?? []).map(item => ({
    ...item,
    type: item.tipo === 'basica' ? 'B' : 'C'
  })).sort((left, right) => left.referencia.localeCompare(right.referencia, 'pt-BR'));

  const card = document.createElement('div');
  card.className = 'subject';

  const header = document.createElement('div');
  header.className = 'subject-header';

  let activeLinksCount = 0;
  for (const ref of references) {
    if (ref.bibtex) {
      for (const path of ref.bibtex) {
        if (path && bibCache[path]) {
          activeLinksCount++;
        }
      }
    }
  }

  const name = document.createElement('div');
  name.className = 'subject-name';
  name.textContent = subject.disciplina;
  header.appendChild(name);

  const countBadge = document.createElement('span');
  countBadge.className = 'badge badge-count';
  countBadge.textContent = `${activeLinksCount} ${activeLinksCount === 1 ? 'link externo' : 'links externos'}`;
  name.appendChild(countBadge);

  if (subject.docentes?.length) {
    const instructors = document.createElement('div');
    instructors.className = 'subject-instructors';
    instructors.textContent = subject.docentes.join(', ');
    header.appendChild(instructors);
  }

  card.appendChild(header);

  if (!references.length) {
    const empty = document.createElement('div');
    empty.className = 'no-books';
    empty.textContent = 'Nenhuma referência cadastrada.';
    card.appendChild(empty);
    return card;
  }

  const books = document.createElement('div');
  books.className = 'books';

  for (const reference of references) {
    const row = document.createElement('div');
    row.className = 'book';

    const citation = document.createElement('div');
    citation.className = 'book-citation';

    const originalBlock = document.createElement('div');
    originalBlock.className = 'ref-original';
    originalBlock.innerHTML = renderText(reference.referencia);
    citation.appendChild(originalBlock);

    let abntRendered = false;

    if (reference.bibtex && reference.bibtex.length > 0) {
      const firstPath = reference.bibtex[0];
      const bibFields = bibCache[firstPath];
      if (bibFields) {
        abntRendered = true;
        const abntBlock = document.createElement('div');
        abntBlock.className = 'ref-abnt';

        const abntTextSpan = document.createElement('span');
        const kohaUrl = bibFields.url || null;
        const isbns = getBibIsbns(bibFields);
        abntTextSpan.innerHTML = formatAbnt(bibFields, kohaUrl, isbns);
        abntBlock.appendChild(abntTextSpan);

        abntBlock.insertAdjacentHTML('beforeend', renderKohaLinks(reference.bibtex, bibCache));

        for (const path of reference.bibtex) {
          if (!path) continue;
          const bibLink = document.createElement('a');
          bibLink.className = 'bib-link';
          bibLink.style.marginLeft = '6px';
          bibLink.href = '../' + path;
          bibLink.target = '_blank';
          bibLink.textContent = `(${path.split('/').pop()})`;
          abntBlock.appendChild(bibLink);
        }

        citation.appendChild(abntBlock);
      }
    }

    if (!abntRendered) {
      originalBlock.insertAdjacentHTML('beforeend', renderKohaLinks(reference.bibtex, bibCache));
    }

    row.appendChild(citation);

    const badge = document.createElement('span');
    badge.className = `badge ${reference.type === 'B' ? 'badge-basic' : 'badge-complementary'}`;
    badge.textContent = reference.type;
    row.appendChild(badge);

    books.appendChild(row);
  }

  card.appendChild(books);
  return card;
}

/* ── Main ─────────────────────────────────────────────────────── */
async function load() {
  const content = document.getElementById('content');

  try {
    const response = await fetch('ementario.json');
    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const subjects = await response.json();
    const bibCache = await fetchBibCache(subjects);
    const groups = {};

    for (const subject of subjects) {
      const group = normalizeLabel(subject.tipoDisciplina).includes('optativ')
        ? 'Optativas'
        : subject.periodo;
      (groups[group] ??= []).push(subject);
    }

    const getTabSlug = name => {
      const match = name.match(/(\d+)/);
      if (match) return 'p' + match[1];
      const norm = normalizeLabel(name);
      if (norm.includes('opt')) return 'optativas';
      return norm.replace(/\s+/g, '-');
    };
    const urlParams = new URLSearchParams(window.location.search);
    const initialTabSlug = urlParams.get('tab');

    content.replaceChildren();

    const tabsContainer = document.createElement('div');
    tabsContainer.className = 'tabs-container';
    content.appendChild(tabsContainer);

    const semesterKeys = semesterSort(Object.keys(groups));
    const sections = [];
    const buttons = [];

    semesterKeys.forEach((groupName, idx) => {
      const section = document.createElement('div');
      section.className = 'semester';
      section.id = `semester-${idx}`;



      groups[groupName]
        .sort((left, right) => left.disciplina.localeCompare(right.disciplina, 'pt-BR'))
        .forEach(subject => section.appendChild(renderSubject(subject, bibCache)));

      content.appendChild(section);
      sections.push(section);

      const btn = document.createElement('button');
      btn.className = 'tab-button';
      btn.textContent = groupName;

      const slug = getTabSlug(groupName);
      btn.dataset.slug = slug;

      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        sections.forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        section.classList.add('active');

        const url = new URL(window.location);
        url.searchParams.set('tab', slug);
        window.history.replaceState({}, '', url);
      });

      tabsContainer.appendChild(btn);
      buttons.push(btn);
    });

    let activeIdx = 0;
    if (initialTabSlug) {
      const foundIdx = semesterKeys.findIndex(name => getTabSlug(name) === initialTabSlug);
      if (foundIdx !== -1) {
        activeIdx = foundIdx;
      }
    }

    if (buttons[activeIdx]) {
      buttons[activeIdx].classList.add('active');
      sections[activeIdx].classList.add('active');
    }
  } catch (error) {
    content.innerHTML = '<div class="error">Não foi possível carregar a bibliografia.</div>';
    console.error(error);
  }
}

load();
</script>
</body>
</html>
